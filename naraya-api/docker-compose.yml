services:
  postgres:
    image: postgres:16-alpine
    container_name: naraya-postgres
    environment:
      POSTGRES_DB: naraya
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - naraya_postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro

volumes:
  naraya_postgres_data:
